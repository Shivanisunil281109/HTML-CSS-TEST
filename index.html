<!doctype html>
<html lang="en">
  <head>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      header {
        width: 100%;
        height: 100px;
        display: flex;

        justify-content: space-between;
        text-align: center;
        background-color: white;
      }
      .logo {
        display: flex;
        align-items: center;
        margin-left: 120px;
      }
      .logo h1 {
        margin-left: 15px;
      }
      nav {
        margin-right: 120px;
      }
      nav ul {
        display: flex;
        list-style: none;
      }
      nav ul li {
        padding: 40px;
      }
      nav ul li a {
        text-decoration: none;
        padding: 40px 30px;
        transition: 0.3s;
        color: #333;
      }
      nav ul li a:hover {
        background: #ee5057;
        color: white;
      }

      .hero {
        width: 100%;
        height: 700px;

        background-image: url("https://www.tooplate.com/templates/2095_level/img/bg-img-1.jpg");
        background-size: cover;
        background-position: center;
        position: relative;
      }

      .overlay {
        width: 100%;
        height: 100%;
        /* background:rgba(0,0,0,0.5); */
        position: absolute;
      }

      .booking-box {
        width: 70%;
        background-color: white;
        position: absolute;
        top: 50%;
        left: 50%;

        transform: translate(-50%, -50%);
        padding: 40px;
      }
      .row {
        display: flex;
        gap: 10px;
      }
      .row input {
        width: 33%;
        padding: 15px;
      }
      .row2 {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }

      .row2 select {
        width: 25%;
        padding: 15px;
        padding: 10px;
      }
      .row2 button {
        width: 25%;
        height: 50px;
        border: none;
        background: #ee5057;
        color: white;
        font-weight: bold;
        cursor: pointer;
      }

      .help {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 20px;
      }

      .help a {
        color: #ee5057;
        text-decoration: none;
      }
      .help a {
        color: #ee5057;
        text-decoration: none;
      }

      .newsletter {
        width: 100%;
        background: #ee5057;

        text-align: center;

        padding: 80px 20px;
      }

      .newsletter h1 {
        color: white;

        font-size: 60px;

        font-weight: 300;

        margin-bottom: 20px;
      }

      .newsletter p {
        color: white;

        font-size: 24px;

        margin-bottom: 30px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo">
        <img src="https://www.tooplate.com/templates/2095_level/img/logo.png" />
        <h1>Level</h1>
      </div>
      <nav>
        <ul>
          <li><a href="#"> HOME</a></li>
          <li><a href="#">PORTFOLTO</a></li>
          <li><a href="#">BLOG </a></li>
          <li><a href="#">CONTACT US</a></li>
        </ul>
      </nav>
    </header>

    <section class="hero">
      <div class="overlay"></div>

      <div class="booking-box">
        <div class="row">
          <input type="text" placeholder="Type your destination..." />
          <input
            type="text"
            placeholder="Check In"
            onfocus="this.type = 'date'"
          />

          <input
            type="text"
            placeholder="Check Out"
            onfocus="this.type = 'date'"
          />
        </div>

        <div class="row2">
          <select>
            <option>Adult</option>
          </select>

          <select>
            <option>Children</option>
          </select>

          <select>
            <option>Room</option>
          </select>

          <button>CHECK AVAILABLITY</button>
        </div>

        <div class="help">
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
          <a href="#"> Need Help ?</a>
        </div>
      </div>
    </section>

    <section class="newsletter">
      <h1>We are here to help you?</h1>

      <p>Subscribe to get our newsletters</p>

      <br />

      <button>SUBSCRIBE NEWSLETTERS</button>
    </section>
  </body>
</html>
